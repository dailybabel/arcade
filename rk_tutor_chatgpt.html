```html id="rubiks-fixed-orientation"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rubik's Cube Tutor</title>
<style>
  body { margin:0; overflow:hidden; font-family:system-ui; background:#0f1115; color:#fff; }
  #ui { position:absolute; top:0; left:0; right:0; padding:10px; display:flex; justify-content:space-between; pointer-events:none;}
  .panel { background:rgba(20,22,28,0.85); backdrop-filter:blur(8px); border-radius:10px; padding:10px; pointer-events:auto; }
  button { margin:2px; padding:6px 10px; border:none; border-radius:6px; background:#2b2f3a; color:#fff; cursor:pointer;}
  button:hover { background:#3a3f4d;}
  #controls { position:absolute; bottom:10px; left:10px; }
</style>
</head>
<body>

<div id="ui">
  <div class="panel">
    <b>Rubik's Cube Tutor</b><br/>
    <button onclick="app.scramble()">Scramble</button>
    <button onclick="app.reset()">Reset</button>
  </div>
</div>

<div id="controls" class="panel"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
class CubeEngine {
  constructor(){ this.reset(); }

  reset(){
    this.cubies=[];
    for(let x=-1;x<=1;x++)
    for(let y=-1;y<=1;y++)
    for(let z=-1;z<=1;z++){
      this.cubies.push({
        pos:new THREE.Vector3(x,y,z),
        quat:new THREE.Quaternion(), // orientation
        mesh:null
      });
    }
  }

  applyMove(move){
    let axis, layer, dir;
    if(move[0]==='U'){axis='y'; layer=1; dir=1;}
    if(move[0]==='D'){axis='y'; layer=-1; dir=-1;}
    if(move[0]==='R'){axis='x'; layer=1; dir=1;}
    if(move[0]==='L'){axis='x'; layer=-1; dir=-1;}
    if(move[0]==='F'){axis='z'; layer=1; dir=1;}
    if(move[0]==='B'){axis='z'; layer=-1; dir=-1;}
    if(move.includes("'")) dir*=-1;

    const angle = Math.PI/2 * dir;
    const rotQuat = new THREE.Quaternion();
    rotQuat.setFromAxisAngle(
      axis==='x'?new THREE.Vector3(1,0,0):
      axis==='y'?new THREE.Vector3(0,1,0):
                  new THREE.Vector3(0,0,1),
      angle
    );

    this.cubies.forEach(c=>{
      if(Math.round(c.pos[axis])===layer){

        // rotate position
        c.pos.applyQuaternion(rotQuat);
        c.pos.x=Math.round(c.pos.x);
        c.pos.y=Math.round(c.pos.y);
        c.pos.z=Math.round(c.pos.z);

        // rotate orientation (CRITICAL FIX)
        c.quat.premultiply(rotQuat);
      }
    });
  }
}

class Renderer {
  constructor(engine){
    this.engine=engine;

    this.scene=new THREE.Scene();

    this.camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
    this.camera.position.set(5,5,5);
    this.camera.lookAt(0,0,0);

    this.renderer=new THREE.WebGLRenderer({antialias:true});
    this.renderer.setSize(innerWidth,innerHeight);
    document.body.appendChild(this.renderer.domElement);

    window.addEventListener('resize',()=>{
      this.camera.aspect=innerWidth/innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(innerWidth,innerHeight);
    });

    this.root=new THREE.Group();
    this.scene.add(this.root);

    this.initLights();
    this.buildCube();
    this.animate();
  }

  initLights(){
    this.scene.add(new THREE.AmbientLight(0x404040));
    let d=new THREE.DirectionalLight(0xffffff,1);
    d.position.set(5,5,5);
    this.scene.add(d);
  }

  buildCube(){
    const geo=new THREE.BoxGeometry(0.95,0.95,0.95);

    this.engine.cubies.forEach(c=>{
      let mats=[
        new THREE.MeshStandardMaterial({color:0xff8000}),
        new THREE.MeshStandardMaterial({color:0xff0000}),
        new THREE.MeshStandardMaterial({color:0xffff00}),
        new THREE.MeshStandardMaterial({color:0xffffff}),
        new THREE.MeshStandardMaterial({color:0x00ff00}),
        new THREE.MeshStandardMaterial({color:0x0000ff})
      ];
      let m=new THREE.Mesh(geo,mats);
      m.position.copy(c.pos);
      this.root.add(m);
      c.mesh=m;
    });
  }

  sync(){
    this.engine.cubies.forEach(c=>{
      c.mesh.position.copy(c.pos);
      c.mesh.quaternion.copy(c.quat);
    });
  }

  animate(){
    requestAnimationFrame(()=>this.animate());
    this.renderer.render(this.scene,this.camera);
  }
}

class App {
  constructor(){
    this.engine=new CubeEngine();
    this.renderer=new Renderer(this.engine);

    this.queue=[];
    this.animating=false;
    this.speed=180;

    this.initUI();
  }

  initUI(){
    const ctrl=document.getElementById('controls');
    ["F","R","U","L","D","F'","R'","U'","L'","D'"].forEach(m=>{
      let b=document.createElement('button');
      b.textContent=m;
      b.onclick=()=>this.enqueue([m]);
      ctrl.appendChild(b);
    });
  }

  enqueue(moves){
    this.queue.push(...moves);
    this.process();
  }

  process(){
    if(this.animating || !this.queue.length) return;
    let m=this.queue.shift();
    this.animating=true;
    this.animateMove(m,()=>{
      this.engine.applyMove(m);
      this.renderer.sync();
      this.animating=false;
      this.process();
    });
  }

  animateMove(move,cb){
    let axis, layer, dir;
    if(move[0]==='U'){axis='y'; layer=1; dir=1;}
    if(move[0]==='D'){axis='y'; layer=-1; dir=-1;}
    if(move[0]==='R'){axis='x'; layer=1; dir=1;}
    if(move[0]==='L'){axis='x'; layer=-1; dir=-1;}
    if(move[0]==='F'){axis='z'; layer=1; dir=1;}
    if(move[0]==='B'){axis='z'; layer=-1; dir=-1;}
    if(move.includes("'")) dir*=-1;

    let group=new THREE.Group();
    this.renderer.root.add(group);

    let affected=this.engine.cubies.filter(c=>Math.round(c.pos[axis])===layer);
    affected.forEach(c=>group.attach(c.mesh));

    let start=performance.now();

    const step=()=>{
      let t=(performance.now()-start)/this.speed;

      if(t>=1){
        group.rotation[axis]=Math.PI/2*dir;
        affected.forEach(c=>this.renderer.root.attach(c.mesh));
        this.renderer.root.remove(group);
        cb();
        return;
      }

      group.rotation[axis]=Math.PI/2*dir*t;
      requestAnimationFrame(step);
    };

    step();
  }

  scramble(){
    const faces=["R","L","U","D","F","B"];
    let seq=[];
    for(let i=0;i<25;i++){
      let m=faces[Math.floor(Math.random()*6)];
      if(Math.random()>0.5)m+="'";
      seq.push(m);
    }
    this.enqueue(seq);
  }

  reset(){ location.reload(); }
}

const app=new App();
</script>
</body>
</html>
