<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmic Invaders 3D</title>
<style>
  body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; }
  #ui {
    position:absolute; top:10px; left:10px; z-index:10;
    font-size:14px;
  }
  #start {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    padding:20px 40px; background:#111; border:1px solid #0ff;
    cursor:pointer; font-size:18px;
  }
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<div id="start">START GAME</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene, camera, renderer;
let player, bullets=[], enemies=[], explosions=[];
let score=0;
let gameRunning=false;

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 10;

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starCount = 1000;
  const positions = [];
  for(let i=0;i<starCount;i++){
    positions.push((Math.random()-0.5)*200);
    positions.push((Math.random()-0.5)*200);
    positions.push((Math.random()-0.5)*200);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  const starMat = new THREE.PointsMaterial({color:0xffffff});
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // Player
  const geo = new THREE.ConeGeometry(0.5,1,8);
  const mat = new THREE.MeshBasicMaterial({color:0x00ffff});
  player = new THREE.Mesh(geo, mat);
  player.rotation.x = Math.PI/2;
  player.position.y = -4;
  scene.add(player);

  spawnEnemies();
  animate();
}

function spawnEnemies(){
  for(let i=0;i<30;i++){
    const geo = new THREE.BoxGeometry(0.7,0.7,0.7);
    const mat = new THREE.MeshBasicMaterial({color:0xff00ff});
    const enemy = new THREE.Mesh(geo, mat);
    enemy.position.set((i%10)-5, Math.floor(i/10), 0);
    scene.add(enemy);
    enemies.push(enemy);
  }
}

function shoot(){
  const geo = new THREE.CylinderGeometry(0.05,0.05,0.5);
  const mat = new THREE.MeshBasicMaterial({color:0xffff00});
  const bullet = new THREE.Mesh(geo, mat);
  bullet.rotation.x = Math.PI/2;
  bullet.position.copy(player.position);
  scene.add(bullet);
  bullets.push(bullet);
}

function explode(pos){
  const particles = [];
  for(let i=0;i<20;i++){
    const geo = new THREE.SphereGeometry(0.05);
    const mat = new THREE.MeshBasicMaterial({color:Math.random()*0xffffff});
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.velocity = new THREE.Vector3((Math.random()-0.5)*0.2,(Math.random()-0.5)*0.2,(Math.random()-0.5)*0.2);
    scene.add(p);
    particles.push(p);
  }
  explosions.push(particles);
}

function animate(){
  requestAnimationFrame(animate);
  if(!gameRunning) return renderer.render(scene,camera);

  // bullets
  bullets.forEach((b,i)=>{
    b.position.y += 0.2;
    if(b.position.y > 10){ scene.remove(b); bullets.splice(i,1);}    
  });

  // enemies
  enemies.forEach((e,i)=>{
    e.position.x += Math.sin(Date.now()*0.001+i)*0.002;
  });

  // collisions
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(b.position.distanceTo(e.position) < 0.5){
        explode(e.position);
        scene.remove(e); enemies.splice(ei,1);
        scene.remove(b); bullets.splice(bi,1);
        score+=10;
        document.getElementById('score').textContent=score;
      }
    });
  });

  // explosions
  explosions.forEach((group,gi)=>{
    group.forEach(p=>{
      p.position.add(p.velocity);
      p.scale.multiplyScalar(0.95);
    });
  });

  renderer.render(scene,camera);
}

// Controls
window.addEventListener('mousemove', e=>{
  player.position.x = (e.clientX/window.innerWidth)*10-5;
});

window.addEventListener('touchmove', e=>{
  player.position.x = (e.touches[0].clientX/window.innerWidth)*10-5;
});

window.addEventListener('click', shoot);
window.addEventListener('touchstart', shoot);

// Start
document.getElementById('start').onclick = ()=>{
  document.getElementById('start').style.display='none';
  gameRunning=true;
};

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
