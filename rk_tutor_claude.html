<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rubik's Cube Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;
  --panel:rgba(10,10,24,0.97);
  --border:rgba(0,180,220,0.18);
  --accent:#00d4ff;
  --accent-dim:rgba(0,212,255,0.12);
  --gold:#ffb703;
  --gold-dim:rgba(255,183,3,0.1);
  --purple:#a78bfa;
  --text:#c8d8e8;
  --muted:#4a5a6a;
  --success:#00e676;
  --danger:#ff5252;
  --mono:'Space Mono','Courier New',monospace;
  --ui:'Exo 2','Segoe UI',sans-serif;
  --bar:52px;
  --pw:262px;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,180,220,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,220,0.03) 1px,transparent 1px);
  background-size:44px 44px;
}
#app{position:relative;z-index:1;display:flex;flex-direction:column;width:100%;height:100%}

/* ── TOP BAR ── */
#topbar{
  height:var(--bar);display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(6,6,18,0.97);border-bottom:1px solid var(--border);
  flex-shrink:0;backdrop-filter:blur(12px);
}
.logo{
  font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);
  letter-spacing:3px;white-space:nowrap;text-shadow:0 0 20px rgba(0,212,255,.45);
  flex-shrink:0;
}
.logo em{color:var(--gold);font-style:normal}
.bar-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.bar-btns{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
#cube-status{
  font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:3px;
  letter-spacing:1px;flex-shrink:0;margin-left:auto;
}
#cube-status.unsolved{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);color:#ff7070}
#cube-status.solved{
  background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--success);
  animation:solvedPulse 1.4s ease-in-out infinite;
}
@keyframes solvedPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.3)}50%{box-shadow:0 0 14px 3px rgba(0,230,118,.18)}}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
#panel{
  width:var(--pw);background:var(--panel);border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;
}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sec{padding:12px;border-bottom:1px solid rgba(0,180,220,.07)}
.sec-title{
  font-family:var(--mono);font-size:8px;letter-spacing:2.5px;color:var(--accent);
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── BUTTONS ── */
button{
  cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:1px;
  border:1px solid var(--border);border-radius:3px;
  background:rgba(0,180,220,.05);color:var(--text);padding:6px 10px;
  transition:all .13s ease;user-select:none;white-space:nowrap;
}
button:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(0,212,255,.18)}
button:active{background:rgba(0,212,255,.22);transform:translateY(1px)}
button.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
button.ghost{background:transparent;border-color:transparent;color:var(--muted)}
button.ghost:hover{background:var(--accent-dim);border-color:var(--border);color:var(--text)}
button.danger{border-color:rgba(255,82,82,.3);color:var(--danger);background:rgba(255,82,82,.06)}
button.danger:hover{background:rgba(255,82,82,.15);border-color:var(--danger);box-shadow:0 0 12px rgba(255,82,82,.18)}

#topbar button{padding:5px 12px;font-size:9px}
#topbar select{
  background:rgba(0,180,220,.05);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:9px;padding:5px 8px;border-radius:3px;
  cursor:pointer;outline:none;letter-spacing:1px;
}
#topbar select option{background:#0a0a16}
#topbar select:hover{border-color:var(--accent)}

/* ── MOVE GRID ── */
.move-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.move-btn{padding:6px 2px;font-size:11px;text-align:center;letter-spacing:.5px}
.move-btn.prime{color:var(--gold);border-color:rgba(255,183,3,.2);background:var(--gold-dim)}
.move-btn.prime:hover{border-color:var(--gold);box-shadow:0 0 10px rgba(255,183,3,.2)}
.move-btn.double{color:var(--purple);border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.06)}
.move-btn.double:hover{border-color:var(--purple);box-shadow:0 0 10px rgba(167,139,250,.2)}

/* ── VIEW BTNS ── */
.view-row{display:flex;gap:4px}
.view-btn{flex:1;padding:6px 4px;font-size:9px}

/* ── RULE PANEL ── */
#rule-select{
  width:100%;padding:7px 10px;font-size:10px;margin-bottom:10px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);border-radius:3px;outline:none;cursor:pointer;letter-spacing:.5px;
}
#rule-select option{background:#0a0a1a}
#rule-select:hover{border-color:var(--accent)}
#rule-name{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);margin-bottom:5px}
#rule-desc{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:9px}
.moves-box{
  background:rgba(0,0,0,.35);border:1px solid rgba(0,180,220,.12);
  border-radius:3px;padding:8px 10px;margin-bottom:10px;
}
.moves-label{font-family:var(--mono);font-size:7px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px}
#rule-moves{font-family:var(--mono);font-size:13px;letter-spacing:2.5px;word-break:break-word;line-height:1.7}
.rule-ctrl{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.rule-ctrl button{flex:1;min-width:60px;font-size:9px}

/* ── STEP ── */
#step-box{
  background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.18);
  border-radius:4px;padding:10px;display:none;flex-direction:column;gap:8px;
}
#step-box.show{display:flex}
#step-info{
  font-family:var(--mono);font-size:12px;color:var(--accent);text-align:center;
  padding:4px 0;letter-spacing:1px;
}
#step-progress{
  display:flex;gap:3px;justify-content:center;flex-wrap:wrap;
}
.step-dot{
  width:8px;height:8px;border-radius:50%;background:rgba(0,212,255,.2);
  border:1px solid rgba(0,212,255,.3);transition:all .2s ease;flex-shrink:0;
}
.step-dot.done{background:rgba(0,212,255,.6);border-color:var(--accent)}
.step-dot.current{background:var(--accent);box-shadow:0 0 6px rgba(0,212,255,.6)}
#btn-next-step{width:100%;padding:9px;font-size:10px;letter-spacing:1.5px}

/* ── HISTORY ── */
#history{
  font-family:var(--mono);font-size:10px;color:var(--muted);
  line-height:2;word-break:break-all;letter-spacing:1px;
  max-height:76px;overflow-y:auto;
}
#history::-webkit-scrollbar{width:2px}
#history::-webkit-scrollbar-thumb{background:var(--border)}

/* ── CANVAS ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab}
#canvas-wrap:active{cursor:grabbing}
#canvas-wrap canvas{display:block;width:100%!important;height:100%!important}

/* ── SOLVED OVERLAY ── */
#solved-overlay{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
}
#solved-overlay.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.solved-card{
  background:var(--panel);border:1px solid var(--success);border-radius:8px;
  padding:40px 56px;text-align:center;
  box-shadow:0 0 80px rgba(0,230,118,.2);
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.solved-card h2{
  font-family:var(--mono);font-size:28px;color:var(--success);
  letter-spacing:4px;text-shadow:0 0 30px rgba(0,230,118,.5);margin-bottom:8px;
}
.solved-card p{color:var(--muted);font-size:13px}
.solved-card button{margin-top:18px;padding:9px 24px;font-size:11px;letter-spacing:2px}

/* ── MOBILE PANEL TOGGLE ── */
#panel-toggle{
  display:none;position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:10;padding:8px 20px;font-size:9px;letter-spacing:2px;
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.4);
}
#panel-toggle:hover{background:rgba(0,212,255,.22)}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  :root{--pw:100%}
  #main{flex-direction:column-reverse}
  #panel{
    width:100%;max-height:0;overflow:hidden;
    transition:max-height .35s cubic-bezier(.4,0,.2,1);
    border-right:none;border-top:1px solid var(--border);
  }
  #panel.open{max-height:320px;overflow-y:auto}
  #panel-toggle{display:flex}
  .logo{font-size:11px;letter-spacing:2px}
  #topbar button{padding:4px 8px;font-size:8px}
}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="logo">CUBE<em>◆</em>TUTOR</div>
    <div class="bar-sep"></div>
    <div class="bar-btns">
      <button id="btn-scramble">SCRAMBLE</button>
      <button id="btn-reset" class="danger">RESET</button>
      <div class="bar-sep"></div>
      <button id="btn-undo">↩ UNDO</button>
      <button id="btn-redo">REDO ↪</button>
      <div class="bar-sep"></div>
      <select id="speed-select" title="Animation speed">
        <option value="400">SLOW</option>
        <option value="200" selected>NORMAL</option>
        <option value="80">FAST</option>
        <option value="20">INSTANT</option>
      </select>
    </div>
    <div id="cube-status" class="unsolved">● UNSOLVED</div>
  </div>

  <!-- MAIN AREA -->
  <div id="main">

    <!-- LEFT PANEL -->
    <div id="panel">

      <!-- MOVE BUTTONS -->
      <div class="sec">
        <div class="sec-title">MOVES</div>
        <div class="move-grid" id="move-grid">
          <button class="move-btn" data-move="U">U</button>
          <button class="move-btn prime" data-move="U'">U'</button>
          <button class="move-btn double" data-move="U2">U2</button>
          <button class="move-btn" data-move="D">D</button>
          <button class="move-btn prime" data-move="D'">D'</button>
          <button class="move-btn double" data-move="D2">D2</button>
          <button class="move-btn" data-move="R">R</button>
          <button class="move-btn prime" data-move="R'">R'</button>
          <button class="move-btn double" data-move="R2">R2</button>
          <button class="move-btn" data-move="L">L</button>
          <button class="move-btn prime" data-move="L'">L'</button>
          <button class="move-btn double" data-move="L2">L2</button>
          <button class="move-btn" data-move="F">F</button>
          <button class="move-btn prime" data-move="F'">F'</button>
          <button class="move-btn double" data-move="F2">F2</button>
          <button class="move-btn" data-move="B">B</button>
          <button class="move-btn prime" data-move="B'">B'</button>
          <button class="move-btn double" data-move="B2">B2</button>
        </div>
      </div>

      <!-- CAMERA -->
      <div class="sec">
        <div class="sec-title">CAMERA</div>
        <div class="view-row">
          <button class="view-btn" data-view="front">FRONT</button>
          <button class="view-btn" data-view="angle">ANGLE</button>
          <button class="view-btn" data-view="top">TOP</button>
        </div>
      </div>

      <!-- ALGORITHMS -->
      <div class="sec">
        <div class="sec-title">ALGORITHMS</div>
        <select id="rule-select"></select>
        <div id="rule-name">—</div>
        <div id="rule-desc"></div>
        <div class="moves-box">
          <div class="moves-label">SEQUENCE</div>
          <div id="rule-moves"></div>
        </div>
        <div class="rule-ctrl">
          <button id="btn-play-rule" class="active">▶ PLAY</button>
          <button id="btn-step-mode">STEP</button>
          <button id="btn-auto-play">∞ AUTO</button>
        </div>
        <div id="step-box">
          <div id="step-info">—</div>
          <div id="step-progress"></div>
          <button id="btn-next-step">NEXT STEP →</button>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="sec">
        <div class="sec-title">HISTORY</div>
        <div id="history">—</div>
      </div>

    </div><!-- /panel -->

    <!-- 3D CANVAS -->
    <div id="canvas-wrap"></div>
    <button id="panel-toggle" id="panel-toggle">▲ CONTROLS</button>

  </div><!-- /main -->

</div><!-- /app -->

<!-- SOLVED OVERLAY -->
<div id="solved-overlay">
  <div class="solved-card">
    <h2>✓ SOLVED</h2>
    <p>Excellent work — cube solved!</p>
    <button id="btn-dismiss">CONTINUE</button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════

const C = {
  WHITE:  0xf0f0f0,
  YELLOW: 0xffe620,
  GREEN:  0x1db954,
  BLUE:   0x1565d0,
  RED:    0xe53030,
  ORANGE: 0xff7800,
  BLACK:  0x111114,
};

// Face index: 0=+X(R), 1=−X(L), 2=+Y(U), 3=−Y(D), 4=+Z(F), 5=−Z(B)
const FACE_COLOR = [C.RED, C.ORANGE, C.WHITE, C.YELLOW, C.GREEN, C.BLUE];

// Sticker permutation per rotation key: new[i] = old[perm[i]]
// Derived from rotation matrices applied to basis vectors.
const SPERMS = {
  'Y+': [4,5,2,3,1,0],  // Ry(+90°): U-CW
  'Y-': [5,4,2,3,0,1],  // Ry(−90°): U-CCW / D-CW
  'X+': [0,1,5,4,2,3],  // Rx(+90°): R-CW
  'X-': [0,1,4,5,3,2],  // Rx(−90°): R-CCW / L-CW
  'Z+': [3,2,0,1,4,5],  // Rz(+90°): F-CCW / B-CW
  'Z-': [2,3,1,0,4,5],  // Rz(−90°): F-CW
};

// Move definitions: axis, layer (+1/−1), dir (+1=+90°, −1=−90°, 2=180°)
const MDEF = {
  'U':  {ax:'Y',ly: 1,dr:-1}, "U'": {ax:'Y',ly: 1,dr: 1}, 'U2': {ax:'Y',ly: 1,dr: 2},
  'D':  {ax:'Y',ly:-1,dr: 1}, "D'": {ax:'Y',ly:-1,dr:-1}, 'D2': {ax:'Y',ly:-1,dr: 2},
  'R':  {ax:'X',ly: 1,dr:-1}, "R'": {ax:'X',ly: 1,dr: 1}, 'R2': {ax:'X',ly: 1,dr: 2},
  'L':  {ax:'X',ly:-1,dr: 1}, "L'": {ax:'X',ly:-1,dr:-1}, 'L2': {ax:'X',ly:-1,dr: 2},
  'F':  {ax:'Z',ly: 1,dr:-1}, "F'": {ax:'Z',ly: 1,dr: 1}, 'F2': {ax:'Z',ly: 1,dr: 2},
  'B':  {ax:'Z',ly:-1,dr: 1}, "B'": {ax:'Z',ly:-1,dr:-1}, 'B2': {ax:'Z',ly:-1,dr: 2},
};

const INV = {
  'U':"U'","U'":"U",'U2':'U2',
  'D':"D'","D'":"D",'D2':'D2',
  'R':"R'","R'":"R",'R2':'R2',
  'L':"L'","L'":"L",'L2':'L2',
  'F':"F'","F'":"F",'F2':'F2',
  'B':"B'","B'":"B",'B2':'B2',
};

const RULES = [
  {id:'RT',    name:'Right Trigger',       desc:'Core insert: right side. Foundation of most solving steps.',        moves:["R","U","R'"]},
  {id:'LT',    name:'Left Trigger',        desc:'Core insert: left side. Mirror of the right trigger.',             moves:["L'","U'","L"]},
  {id:'RT_I',  name:'Right Trigger Inv.',  desc:'Inverse right trigger — used to extract or undo insertions.',      moves:["R","U'","R'"]},
  {id:'LT_I',  name:'Left Trigger Inv.',   desc:'Inverse left trigger — extracts or undoes left side inserts.',     moves:["L'","U","L"]},
  {id:'WC_R',  name:'White Corner Right',  desc:'Insert white corner from top layer into the right-hand slot.',    moves:["R","U","R'"]},
  {id:'WC_L',  name:'White Corner Left',   desc:'Insert white corner from top layer into the left-hand slot.',     moves:["L'","U'","L"]},
  {id:'ME_R',  name:'Middle Edge Right',   desc:'Slide a top-layer edge piece into the right middle-layer slot.',  moves:["U","R","U'","R'","U'","F'","U","F"]},
  {id:'ME_L',  name:'Middle Edge Left',    desc:'Slide a top-layer edge piece into the left middle-layer slot.',   moves:["U'","L'","U","L","U","F","U'","F'"]},
  {id:'YX',    name:'Yellow Cross',        desc:'Orient the four U-face edge pieces to show yellow on top.',       moves:["F","R","U","R'","U'","F'"]},
  {id:'YF',    name:'Yellow Face',         desc:'Orient all yellow corners to complete the full yellow face.',     moves:["R","U","R'","U","R","U2","R'"]},
  {id:'CS',    name:'Corner Swap',         desc:'Permute the U-face corners into their correct positions.',        moves:["U","R","U'","L'","U","R'","U'","L"]},
  {id:'EC',    name:'Edge Cycle',          desc:'Cycle the last-layer edges to complete the solve.',               moves:["R","U","R'","U","R","U2","R'","U"]},
];

// ══════════════════════════════════════════════
//  CUBE ENGINE
// ══════════════════════════════════════════════

class CubeEngine {
  constructor() { this.reset(); }

  reset() {
    this.cubies = [];
    let id = 0;
    for (let x=-1;x<=1;x++)
      for (let y=-1;y<=1;y++)
        for (let z=-1;z<=1;z++) {
          if (x===0&&y===0&&z===0) continue;
          const col = this._initColors(x,y,z);
          this.cubies.push({
            id: id++,
            pos: {x,y,z},
            ip:  {x,y,z},  // initial position
            col, ic: [...col],  // colors, initial colors
          });
        }
  }

  _initColors(x,y,z) {
    return [
      x=== 1?FACE_COLOR[0]:null,
      x===-1?FACE_COLOR[1]:null,
      y=== 1?FACE_COLOR[2]:null,
      y===-1?FACE_COLOR[3]:null,
      z=== 1?FACE_COLOR[4]:null,
      z===-1?FACE_COLOR[5]:null,
    ];
  }

  // Transform a position by axis+direction (single 90° step)
  _tpos(p, ax, dr) {
    const {x,y,z}=p;
    if (ax==='Y') return dr>0?{x:z,y,z:-x}:{x:-z,y,z:x};
    if (ax==='X') return dr>0?{x,y:-z,z:y}:{x,y:z,z:-y};
    /* Z */       return dr>0?{x:-y,y:x,z}:{x:y,y:-x,z};
  }

  // Apply sticker permutation once
  _sperm(col, ax, dr) {
    const p = SPERMS[ax+(dr>0?'+':'-')];
    return p.map(i=>col[i]);
  }

  applyMove(mv) {
    const {ax,ly,dr} = MDEF[mv];
    const axk = ax.toLowerCase();
    const steps = Math.abs(dr), sd = Math.sign(dr);
    for (const c of this.cubies) {
      if (c.pos[axk] !== ly) continue;
      for (let i=0;i<steps;i++) {
        c.pos = this._tpos(c.pos, ax, sd);
        c.col = this._sperm(c.col, ax, sd);
      }
    }
  }

  isSolved() {
    return this.cubies.every(c =>
      c.pos.x===c.ip.x && c.pos.y===c.ip.y && c.pos.z===c.ip.z &&
      c.col.every((v,i)=>v===c.ic[i])
    );
  }

  snapshot() {
    return this.cubies.map(c=>({pos:{...c.pos},col:[...c.col]}));
  }

  restore(snap) {
    snap.forEach((s,i)=>{
      this.cubies[i].pos={...s.pos};
      this.cubies[i].col=[...s.col];
    });
  }
}

// ══════════════════════════════════════════════
//  CUBE RENDERER
// ══════════════════════════════════════════════

class CubeRenderer {
  constructor(wrap, engine) {
    this.wrap = wrap;
    this.engine = engine;
    this.meshes = new Map(); // cubie id → Group
    this.faceHL = {};
    this.animating = false;
    this.orb = {theta:0.55, phi:1.05, r:7.2};
    this.drag = false;
    this.lm = {x:0,y:0};
    this._init();
  }

  _init() {
    // Scene
    this.scene = new THREE.Scene();

    // Camera
    const W=this.wrap.clientWidth, H=this.wrap.clientHeight;
    this.cam = new THREE.PerspectiveCamera(42, W/H, 0.1, 100);
    this._updateCam();

    // Renderer
    this.gl = new THREE.WebGLRenderer({antialias:true, alpha:true});
    this.gl.setPixelRatio(Math.min(window.devicePixelRatio,2));
    this.gl.setSize(W,H);
    this.gl.shadowMap.enabled = false;
    this.wrap.appendChild(this.gl.domElement);

    // Lighting
    this.scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    const dl1 = new THREE.DirectionalLight(0xffffff, 0.75);
    dl1.position.set(6,9,6);
    this.scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0x88aaff, 0.25);
    dl2.position.set(-4,-4,-6);
    this.scene.add(dl2);

    // Build
    this._buildAll();
    this._buildFaceHL();
    this._initOrbit();
    window.addEventListener('resize', ()=>this._resize());
    this._loop();
  }

  _buildAll() {
    this.meshes.forEach(m=>this.scene.remove(m));
    this.meshes.clear();
    for (const c of this.engine.cubies) {
      const m = this._makeMesh(c.col);
      m.position.set(c.pos.x, c.pos.y, c.pos.z);
      this.scene.add(m);
      this.meshes.set(c.id, m);
    }
  }

  _makeMesh(colors) {
    const g = new THREE.Group();
    // Body
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(0.925,0.925,0.925),
      new THREE.MeshLambertMaterial({color:C.BLACK})
    );
    g.add(body);

    const SZ = 0.795, OFF = 0.465;
    const cfg = [
      {d:[OFF,0,0],  r:[0,Math.PI/2,0]},   // +X
      {d:[-OFF,0,0], r:[0,-Math.PI/2,0]},  // −X
      {d:[0,OFF,0],  r:[-Math.PI/2,0,0]},  // +Y
      {d:[0,-OFF,0], r:[Math.PI/2,0,0]},   // −Y
      {d:[0,0,OFF],  r:[0,0,0]},            // +Z
      {d:[0,0,-OFF], r:[0,Math.PI,0]},     // −Z
    ];

    cfg.forEach((c,i)=>{
      if (colors[i]===null) return;
      const mat = new THREE.MeshLambertMaterial({color:colors[i]});
      const sticker = new THREE.Mesh(new THREE.PlaneGeometry(SZ,SZ), mat);
      sticker.position.set(...c.d);
      sticker.rotation.set(...c.r);
      g.add(sticker);
    });
    return g;
  }

  _buildFaceHL() {
    const faceData = [
      {n:'U',p:[0,1.52,0],  r:[-Math.PI/2,0,0]},
      {n:'D',p:[0,-1.52,0], r:[Math.PI/2,0,0]},
      {n:'R',p:[1.52,0,0],  r:[0,Math.PI/2,0]},
      {n:'L',p:[-1.52,0,0], r:[0,-Math.PI/2,0]},
      {n:'F',p:[0,0,1.52],  r:[0,0,0]},
      {n:'B',p:[0,0,-1.52], r:[0,Math.PI,0]},
    ];
    const hlGeo = new THREE.PlaneGeometry(3.05,3.05);
    faceData.forEach(f=>{
      const m = new THREE.Mesh(hlGeo,
        new THREE.MeshBasicMaterial({
          color:0x00d4ff,transparent:true,opacity:.13,
          side:THREE.DoubleSide,depthWrite:false
        })
      );
      m.position.set(...f.p);
      m.rotation.set(...f.r);
      m.visible = false;
      this.scene.add(m);
      this.faceHL[f.n] = m;
    });
  }

  showFaceHL(name,v) {
    const key = name.replace("'",'').replace('2','');
    if (this.faceHL[key]) this.faceHL[key].visible = v;
  }

  // Animate a move and call cb when done.
  // Does NOT update engine logic — caller does that in cb.
  animateMove(mv, durationMs, cb) {
    const def = MDEF[mv];
    if (!def) { cb&&cb(); return; }
    const {ax,ly,dr} = def;
    const axk = ax.toLowerCase();
    const targetAngle = dr * Math.PI / 2;

    const affected = this.engine.cubies
      .filter(c=>c.pos[axk]===ly)
      .map(c=>this.meshes.get(c.id));

    // Create pivot
    const pivot = new THREE.Group();
    this.scene.add(pivot);

    // Reparent to pivot
    affected.forEach(m=>{
      m.updateWorldMatrix(true,false);
      const wp=new THREE.Vector3(), wq=new THREE.Quaternion(), ws=new THREE.Vector3();
      m.matrixWorld.decompose(wp,wq,ws);
      this.scene.remove(m);
      pivot.add(m);
      m.position.copy(wp);
      m.quaternion.copy(wq);
      m.scale.copy(ws);
    });

    this.showFaceHL(mv, true);
    const axVec = new THREE.Vector3(ax==='X'?1:0, ax==='Y'?1:0, ax==='Z'?1:0);
    const q0 = new THREE.Quaternion();
    const q1 = new THREE.Quaternion().setFromAxisAngle(axVec, targetAngle);
    let t0 = null;
    this.animating = true;

    const tick = (now) => {
      if (!t0) t0 = now;
      const p = Math.min((now-t0)/durationMs, 1);
      // Ease in-out cubic
      const t = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
      pivot.quaternion.slerpQuaternions(q0, q1, t);

      if (p < 1) { requestAnimationFrame(tick); return; }

      // Complete
      pivot.updateMatrixWorld(true);
      affected.forEach(m=>{
        m.updateWorldMatrix(true,false);
        const wp=new THREE.Vector3(), wq=new THREE.Quaternion(), ws=new THREE.Vector3();
        m.matrixWorld.decompose(wp,wq,ws);
        pivot.remove(m);
        this.scene.add(m);
        m.position.copy(wp);
        m.quaternion.copy(wq);
        m.scale.copy(ws);
        // Snap to nearest integer position
        m.position.x = Math.round(m.position.x);
        m.position.y = Math.round(m.position.y);
        m.position.z = Math.round(m.position.z);
      });
      this.scene.remove(pivot);
      this.showFaceHL(mv, false);
      this.animating = false;
      cb && cb();
    };
    requestAnimationFrame(tick);
  }

  _updateCam() {
    const {theta,phi,r} = this.orb;
    this.cam.position.set(
      r*Math.sin(phi)*Math.sin(theta),
      r*Math.cos(phi),
      r*Math.sin(phi)*Math.cos(theta)
    );
    this.cam.lookAt(0,0,0);
  }

  snapCamera(view) {
    const views = {
      front: {theta:0,    phi:Math.PI/2},
      angle: {theta:0.55, phi:1.05},
      top:   {theta:0,    phi:0.08},
    };
    if (views[view]) { Object.assign(this.orb,views[view]); this._updateCam(); }
  }

  _initOrbit() {
    const el = this.gl.domElement;
    el.addEventListener('mousedown', e=>{
      this.drag=true; this.lm={x:e.clientX,y:e.clientY};
    });
    window.addEventListener('mousemove', e=>{
      if(!this.drag)return;
      const dx=e.clientX-this.lm.x, dy=e.clientY-this.lm.y;
      this.orb.theta -= dx*.007;
      this.orb.phi = Math.max(.06,Math.min(Math.PI-.06,this.orb.phi-dy*.007));
      this.lm={x:e.clientX,y:e.clientY};
      this._updateCam();
    });
    window.addEventListener('mouseup', ()=>this.drag=false);
    el.addEventListener('wheel', e=>{
      e.preventDefault();
      this.orb.r = Math.max(4,Math.min(14,this.orb.r+e.deltaY*.011));
      this._updateCam();
    },{passive:false});
    // Touch
    let ld=0;
    el.addEventListener('touchstart', e=>{
      e.preventDefault();
      if(e.touches.length===1){this.drag=true;this.lm={x:e.touches[0].clientX,y:e.touches[0].clientY};}
      else if(e.touches.length===2) ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    },{passive:false});
    el.addEventListener('touchmove', e=>{
      e.preventDefault();
      if(e.touches.length===1&&this.drag){
        const dx=e.touches[0].clientX-this.lm.x,dy=e.touches[0].clientY-this.lm.y;
        this.orb.theta-=dx*.007;
        this.orb.phi = Math.max(.06,Math.min(Math.PI-.06,this.orb.phi-dy*.007));
        this.lm={x:e.touches[0].clientX,y:e.touches[0].clientY};
        this._updateCam();
      } else if(e.touches.length===2){
        const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        this.orb.r=Math.max(4,Math.min(14,this.orb.r-(d-ld)*.018));
        ld=d;this._updateCam();
      }
    },{passive:false});
    el.addEventListener('touchend',()=>this.drag=false);
  }

  _resize() {
    const W=this.wrap.clientWidth,H=this.wrap.clientHeight;
    this.cam.aspect=W/H;
    this.cam.updateProjectionMatrix();
    this.gl.setSize(W,H);
  }

  _loop() {
    requestAnimationFrame(()=>this._loop());
    this.gl.render(this.scene,this.cam);
  }

  rebuild() {
    this._buildAll();
  }

  // Returns a mapping from viewer-relative face names (F/U/R/L/D/B) to
  // world-axis move keys. "F" = face whose normal best aligns with direction
  // FROM cube center TO camera.
  getViewFaceMap() {
    this.cam.updateMatrixWorld();
    const e = this.cam.matrixWorld.elements;
    const camRight = {x:e[0],  y:e[1],  z:e[2]};
    const camUp    = {x:e[4],  y:e[5],  z:e[6]};
    const dot = (n, v) => n[0]*v.x + n[1]*v.y + n[2]*v.z;
    const cp = this.cam.position;
    const cl = Math.hypot(cp.x, cp.y, cp.z) || 1;
    const camPosN = {x:cp.x/cl, y:cp.y/cl, z:cp.z/cl};
    const faces = [
      {n:[1,0,0],key:'R'},{n:[-1,0,0],key:'L'},
      {n:[0,1,0],key:'U'},{n:[0,-1,0],key:'D'},
      {n:[0,0,1],key:'F'},{n:[0,0,-1],key:'B'},
    ];
    let fFront = faces[0];
    faces.forEach(f => { if(dot(f.n,camPosN) > dot(fFront.n,camPosN)) fFront=f; });
    const fBack = faces.find(f => f.n[0]===-fFront.n[0]&&f.n[1]===-fFront.n[1]&&f.n[2]===-fFront.n[2]);
    const rem = faces.filter(f => f!==fFront && f!==fBack);
    let fUp = rem[0];
    rem.forEach(f => { if(dot(f.n,camUp) > dot(fUp.n,camUp)) fUp=f; });
    const fDown = rem.find(f => f.n[0]===-fUp.n[0]&&f.n[1]===-fUp.n[1]&&f.n[2]===-fUp.n[2]);
    const rem2 = rem.filter(f => f!==fUp && f!==fDown);
    const fRight = dot(rem2[0].n,camRight) >= dot(rem2[1].n,camRight) ? rem2[0] : rem2[1];
    const fLeft  = fRight===rem2[0] ? rem2[1] : rem2[0];
    return {F:fFront.key,B:fBack.key,U:fUp.key,D:fDown.key,R:fRight.key,L:fLeft.key};
  }
}

// ══════════════════════════════════════════════
//  MOVE QUEUE
// ══════════════════════════════════════════════

class MoveQueue {
  constructor(renderer, engine, onDone) {
    this.renderer = renderer;
    this.engine = engine;
    this.onDone = onDone;
    this.q = [];
    this.running = false;
    this.ms = 200;
  }

  push(mv) { this.q.push(mv); this._run(); }
  pushAll(mvs) { mvs.forEach(m=>this.q.push(m)); this._run(); }
  clear() { this.q=[]; this.running=false; }
  setMs(ms) { this.ms=ms; }

  _run() {
    if (this.running || this.q.length===0) return;
    this.running = true;
    const mv = this.q.shift();
    this.renderer.animateMove(mv, this.ms, ()=>{
      // Update engine AFTER visual animation
      this.engine.applyMove(mv);
      this.onDone && this.onDone(mv);
      this.running = false;
      this._run();
    });
  }

  get busy() { return this.running || this.q.length>0; }
}

// ══════════════════════════════════════════════
//  APP CONTROLLER
// ══════════════════════════════════════════════

class App {
  constructor() {
    this.engine = new CubeEngine();
    this.history = [];   // moves applied
    this.redo = [];      // moves for redo
    this.ruleIdx = 0;
    this.stepMode = false;
    this.stepMvs = [];
    this.stepI = 0;
    this.autoTimer = null;
    this._init();
  }

  _init() {
    const wrap = document.getElementById('canvas-wrap');
    this.renderer = new CubeRenderer(wrap, this.engine);
    this.queue = new MoveQueue(this.renderer, this.engine, mv=>this._onMove(mv));
    this._buildRuleSelect();
    this._wire();
    this._updateRule();
    this._updateStatus();
    this._updateHistory();
  }

  _buildRuleSelect() {
    const sel = document.getElementById('rule-select');
    RULES.forEach((r,i)=>{
      const o = document.createElement('option');
      o.value=i; o.textContent=`${String(i+1).padStart(2,'0')}. ${r.name}`;
      sel.appendChild(o);
    });
  }

  _wire() {
    document.getElementById('btn-scramble').onclick = ()=>this.scramble();
    document.getElementById('btn-reset').onclick    = ()=>this.reset();
    document.getElementById('btn-undo').onclick     = ()=>this.undo();
    document.getElementById('btn-redo').onclick     = ()=>this.doRedo();
    document.getElementById('btn-play-rule').onclick = ()=>this.playRule();
    document.getElementById('btn-step-mode').onclick = ()=>this.toggleStep();
    document.getElementById('btn-auto-play').onclick = ()=>this.toggleAuto();
    document.getElementById('btn-next-step').onclick = ()=>this.nextStep();
    document.getElementById('btn-dismiss').onclick   = ()=>{
      document.getElementById('solved-overlay').classList.remove('show');
    };
    document.getElementById('rule-select').onchange = e=>{
      this.ruleIdx=+e.target.value;
      this._updateRule();
      if(this.stepMode) this._enterStep();
    };
    document.getElementById('speed-select').onchange = e=>{
      this.queue.setMs(+e.target.value);
    };
    document.querySelectorAll('.move-btn').forEach(b=>{
      b.onclick = ()=>this._userMove(b.dataset.move);
    });
    document.querySelectorAll('.view-btn').forEach(b=>{
      b.onclick = ()=>this.renderer.snapCamera(b.dataset.view);
    });
    // Mobile panel toggle
    document.getElementById('panel-toggle').onclick = ()=>{
      document.getElementById('panel').classList.toggle('open');
    };
  }

  _userMove(mv) {
    if (this.queue.busy) return;
    this.redo=[];
    const worldMv = this._resolveMove(mv);
    const entry = {world: worldMv, label: this._getColorLabel(worldMv)};
    this.history.push(entry);
    this.queue.push(worldMv);
    this._updateHistory();
  }

  // Resolve a viewer-relative move label (e.g. "F'") to the actual world move
  // key based on current camera orientation (e.g. "R'").
  _resolveMove(mv) {
    const base = mv[0];               // 'F', 'R', 'U', etc.
    const suffix = mv.slice(1);       // '', "'", '2'
    const map = this.renderer.getViewFaceMap();
    const worldBase = map[base] || base;
    return worldBase + suffix;
  }

  // Get a color-coded history label for a world move.
  // Uses the fixed center-cubie color so the label is unambiguous even after
  // camera rotation.  E.g. R-face (Red) CW → "R", prime → "R'", double → "R2".
  // Face color initials: R=Red, O=Orange, W=White, Y=Yellow, G=Green, Bl=Blue
  _getColorLabel(worldMove) {
    const base = worldMove.replace("'","").replace("2","");
    const suffix = worldMove.slice(base.length);
    const FACE_IDX = {R:0,L:1,U:2,D:3,F:4,B:5};
    const idx = FACE_IDX[base];
    if (idx === undefined) return worldMove;
    const COLOR_LABEL = {
      [C.RED]:'R',[C.ORANGE]:'O',[C.WHITE]:'W',
      [C.YELLOW]:'Y',[C.GREEN]:'G',[C.BLUE]:'Bl',
    };
    return (COLOR_LABEL[FACE_COLOR[idx]] || base) + suffix;
  }

  _onMove(mv) {
    this._updateStatus();
    if(this.engine.isSolved()) {
      setTimeout(()=>{
        document.getElementById('solved-overlay').classList.add('show');
      },200);
    }
    if(this.stepMode) this._updateStepUI();
  }

  scramble() {
    if(this.queue.busy) return;
    this._hardReset();
    const all = Object.keys(MDEF);
    const mvs = [];
    let lastBase='';
    for(let i=0;i<22;i++){
      let mv;
      let tries=0;
      do { mv=all[Math.floor(Math.random()*all.length)]; tries++; }
      while(tries<20 && mv[0]===lastBase);
      lastBase=mv[0];
      mvs.push(mv);
    }
    this.history=[];
    this.redo=[];
    this.queue.pushAll(mvs);
    this._updateHistory();
  }

  reset() {
    if(this.queue.busy && this.queue.q.length>0) this.queue.clear();
    this._hardReset();
  }

  _hardReset() {
    this.queue.clear();
    this.renderer.animating=false;
    this.engine.reset();
    this.renderer.rebuild();
    this.history=[];
    this.redo=[];
    if(this.stepMode) this._exitStep();
    this._updateStatus();
    this._updateHistory();
    this._stopAuto();
  }

  undo() {
    if(this.history.length===0||this.queue.busy) return;
    const entry = this.history.pop();
    this.redo.push(entry);
    const inv = INV[entry.world];
    // Apply inverse directly (no history push for undo)
    this.renderer.animateMove(inv, this.queue.ms, ()=>{
      this.engine.applyMove(inv);
      this._onMove(inv);
      this.queue.running=false;
      this.queue._run();
    });
    this.queue.running=true;
    this._updateHistory();
  }

  doRedo() {
    if(this.redo.length===0||this.queue.busy) return;
    const entry = this.redo.pop();
    this.history.push(entry);
    this.queue.push(entry.world);
    this._updateHistory();
  }

  playRule() {
    if(this.queue.busy) return;
    const rule = RULES[this.ruleIdx];
    rule.moves.forEach(m=>this.history.push({world:m, label:this._getColorLabel(m)}));
    this.redo=[];
    this.queue.pushAll([...rule.moves]);
    this._updateHistory();
  }

  toggleStep() {
    this.stepMode ? this._exitStep() : this._enterStep();
  }

  _enterStep() {
    this.stepMode=true;
    const rule=RULES[this.ruleIdx];
    this.stepMvs=[...rule.moves];
    this.stepI=0;
    document.getElementById('step-box').classList.add('show');
    document.getElementById('btn-step-mode').classList.add('active');
    document.getElementById('btn-step-mode').textContent='EXIT STEP';
    this._updateStepUI();
  }

  _exitStep() {
    this.stepMode=false;
    this.stepMvs=[];
    this.stepI=0;
    document.getElementById('step-box').classList.remove('show');
    document.getElementById('btn-step-mode').classList.remove('active');
    document.getElementById('btn-step-mode').textContent='STEP';
  }

  nextStep() {
    if(!this.stepMode||this.stepI>=this.stepMvs.length||this.queue.busy) return;
    const mv=this.stepMvs[this.stepI];
    this.stepI++;
    this.history.push({world:mv, label:this._getColorLabel(mv)});
    this.redo=[];
    this.queue.push(mv);
    this._updateHistory();
    this._updateStepUI();
    if(this.stepI>=this.stepMvs.length) setTimeout(()=>this._exitStep(),600);
  }

  _updateStepUI() {
    const info=document.getElementById('step-info');
    const prog=document.getElementById('step-progress');
    const total=this.stepMvs.length;
    if(this.stepI<total){
      info.textContent=`Next: ${this.stepMvs[this.stepI]}  (${this.stepI+1}/${total})`;
    } else {
      info.textContent='Sequence complete!';
    }
    // Dots
    prog.innerHTML='';
    this.stepMvs.forEach((_,i)=>{
      const d=document.createElement('div');
      d.className='step-dot'+(i<this.stepI?' done':i===this.stepI?' current':'');
      prog.appendChild(d);
    });
  }

  toggleAuto() {
    const btn=document.getElementById('btn-auto-play');
    if(this.autoTimer||this.queue.busy){ this._stopAuto(); return; }
    btn.classList.add('active');
    btn.textContent='■ STOP';
    const loop=()=>{
      this.playRule();
      const dur = this.queue.ms * RULES[this.ruleIdx].moves.length + 400;
      this.autoTimer = setTimeout(loop, dur);
    };
    loop();
  }

  _stopAuto() {
    clearTimeout(this.autoTimer);
    this.autoTimer=null;
    const btn=document.getElementById('btn-auto-play');
    btn.classList.remove('active');
    btn.textContent='∞ AUTO';
  }

  _updateRule() {
    const r=RULES[this.ruleIdx];
    document.getElementById('rule-name').textContent=r.name;
    document.getElementById('rule-desc').textContent=r.desc;
    // Colorize moves
    document.getElementById('rule-moves').innerHTML = r.moves.map(m=>{
      let cls='';
      if(m.includes("'")) cls='style="color:var(--gold)"';
      else if(m.includes('2')) cls='style="color:var(--purple)"';
      else cls='style="color:var(--text)"';
      return `<span ${cls}>${m}</span>`;
    }).join(' ');
  }

  _updateStatus() {
    const el=document.getElementById('cube-status');
    if(this.engine.isSolved()){
      el.textContent='✓ SOLVED';
      el.className='solved';
    } else {
      el.textContent='● UNSOLVED';
      el.className='unsolved';
    }
  }

  _updateHistory() {
    const el=document.getElementById('history');
    const recent=this.history.slice(-30);
    if(recent.length===0){el.textContent='—';return;}
    el.innerHTML=recent.map(e=>{
      const m = (typeof e === 'object') ? e.label : e;
      let s='color:var(--text)';
      if(m.includes("'")) s='color:var(--gold)';
      else if(m.includes('2')) s='color:var(--purple)';
      return `<span style="${s}">${m}</span>`;
    }).join(' ');
    el.scrollTop=el.scrollHeight;
  }
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', ()=>{
  window._app = new App();
});
</script>
