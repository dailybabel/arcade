<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game of Life — Extreme Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:#05070a; color:#ddd; font-family:sans-serif; overflow:hidden;}
canvas { display:block; }

.ui {
    position:fixed; top:10px; left:10px;
    background:rgba(20,25,32,.9);
    padding:10px; border-radius:10px;
}

button, select, input {
    margin:2px; padding:5px;
    background:#1f2a36; color:#ddd;
    border:none; border-radius:5px;
}
</style>
</head>
<body>

<canvas id="gl"></canvas>

<div class="ui">
<button id="run">Run</button>
<button id="pause">Pause</button>
<button id="step">Step</button>
<button id="clear">Clear</button>
<br>
<button id="stampBtn">Stamp: OFF</button>
<select id="pattern"></select>
<br>
<button id="save">Save</button>
<input type="file" id="load">
<br>
<input type="file" id="rle">
</div>

<script>
// =====================
// Canvas / WebGL
// =====================
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener("resize", resize);
resize();

// =====================
// Shaders (fixed resolution bug)
// =====================
const vs = `
attribute vec2 a;
uniform vec2 u_offset;
uniform float u_scale;
uniform vec2 u_resolution;

void main(){
    vec2 p = a * u_scale + u_offset;
    vec2 clip = (p / u_resolution) * 2.0 - 1.0;
    gl_Position = vec4(clip.x, -clip.y, 0.0, 1.0);
    gl_PointSize = u_scale;
}`;

const fs = `
precision mediump float;
void main(){
    gl_FragColor = vec4(0.0, 1.0, 0.7, 1.0);
}`;

function compile(type,src){
    const s = gl.createShader(type);
    gl.shaderSource(s,src);
    gl.compileShader(s);
    return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER,vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);

const a = gl.getAttribLocation(prog,"a");
gl.enableVertexAttribArray(a);
gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);

const u_offset = gl.getUniformLocation(prog,"u_offset");
const u_scale = gl.getUniformLocation(prog,"u_scale");
const u_resolution = gl.getUniformLocation(prog,"u_resolution");

// =====================
// Encoding
// =====================
function enc(x,y){ return (x<<16) ^ (y & 0xffff); }
function dec(k){ return [k>>16, (k<<16)>>16]; }

// =====================
// State
// =====================
let live = new Set();
let cache = new Map();

// =====================
// Patterns
// =====================
const patterns = {
    Glider: [[0,0],[1,0],[2,0],[2,1],[1,2]],
    LWSS: [[0,1],[0,3],[1,0],[2,0],[3,0],[4,0],[4,3],[1,4],[4,4]],
    Pulsar: [
        [-6,-4],[-6,-3],[-6,-2],[-6,2],[-6,3],[-6,4],
        [-1,-4],[-1,-3],[-1,-2],[-1,2],[-1,3],[-1,4]
    ]
};

const patternSelect = document.getElementById("pattern");
for (let name in patterns){
    let o = document.createElement("option");
    o.value = name;
    o.textContent = name;
    patternSelect.appendChild(o);
}

let currentPattern = "Glider";
patternSelect.onchange = ()=> currentPattern = patternSelect.value;

// =====================
// Stamp Mode
// =====================
let stampMode = false;
const stampBtn = document.getElementById("stampBtn");

stampBtn.onclick = ()=>{
    stampMode = !stampMode;
    stampBtn.textContent = "Stamp: " + (stampMode ? "ON" : "OFF");
};

// =====================
// Simulation (cached sparse)
// =====================
function hash(){
    let h=0;
    for(let k of live) h = ((h<<5)-h) ^ k;
    return h;
}

function step(){
    const key = hash();
    if(cache.has(key)){
        live = new Set(cache.get(key));
        return;
    }

    const counts = new Map();

    for(let k of live){
        const [x,y] = dec(k);
        for(let dx=-1;dx<=1;dx++){
            for(let dy=-1;dy<=1;dy++){
                if(!dx&&!dy) continue;
                const nk = enc(x+dx,y+dy);
                counts.set(nk,(counts.get(nk)||0)+1);
            }
        }
    }

    const next = new Set();
    for(let [k,c] of counts){
        if(c===3 || (c===2 && live.has(k))) next.add(k);
    }

    cache.set(key,[...next]);
    live = next;
}

// =====================
// RLE Import
// =====================
function loadRLE(text, ox=0, oy=0){
    let lines = text.split("\n").filter(l=>!l.startsWith("#"));
    let body = lines.slice(1).join("");

    let x=0,y=0,num="";

    for(let c of body){
        if(/\d/.test(c)){ num+=c; continue; }
        let n = num?parseInt(num):1;
        num="";

        if(c==="b") x+=n;
        else if(c==="o"){
            for(let i=0;i<n;i++){
                live.add(enc(x+ox,y+oy));
                x++;
            }
        }
        else if(c==="$"){ y+=n; x=0; }
        else if(c==="!") break;
    }
}

// =====================
// View / Interaction
// =====================
let offX = canvas.width/2;
let offY = canvas.height/2;
let scale = 8;

canvas.onclick = e=>{
    const x = Math.floor((e.clientX-offX)/scale);
    const y = Math.floor((e.clientY-offY)/scale);

    if(stampMode){
        const pat = patterns[currentPattern];
        for(let [dx,dy] of pat){
            live.add(enc(x+dx,y+dy));
        }
    } else {
        const k = enc(x,y);
        if(live.has(k)) live.delete(k);
        else live.add(k);
    }
};

canvas.onwheel = e=>{
    e.preventDefault();
    const z = e.deltaY<0?1.1:0.9;

    offX = e.clientX - (e.clientX-offX)*z;
    offY = e.clientY - (e.clientY-offY)*z;

    scale *= z;
    scale = Math.max(2, Math.min(40, scale));
};

let dragging=false, lx,ly;
canvas.onmousedown=e=>{dragging=true; lx=e.clientX; ly=e.clientY;};
canvas.onmouseup=()=>dragging=false;

canvas.onmousemove=e=>{
    if(dragging){
        offX+=e.clientX-lx;
        offY+=e.clientY-ly;
        lx=e.clientX; ly=e.clientY;
    }
};

// =====================
// Render (GPU)
// =====================
function draw(){
    const arr = new Float32Array(live.size*2);
    let i=0;

    for(let k of live){
        const [x,y]=dec(k);
        arr[i++] = x;
        arr[i++] = y;
    }

    gl.bufferData(gl.ARRAY_BUFFER, arr, gl.DYNAMIC_DRAW);

    gl.uniform2f(u_offset, offX, offY);
    gl.uniform1f(u_scale, scale);
    gl.uniform2f(u_resolution, canvas.width, canvas.height);

    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.drawArrays(gl.POINTS, 0, arr.length/2);
}

// =====================
// Loop
// =====================
let running=false;

function loop(){
    if(running) step();
    draw();
    requestAnimationFrame(loop);
}
loop();

// =====================
// UI
// =====================
run.onclick=()=>running=true;
pause.onclick=()=>running=false;
step.onclick=()=>{step(); draw();}
clear.onclick=()=>live.clear();

save.onclick=()=>{
    const blob = new Blob([JSON.stringify([...live])]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "life.json";
    a.click();
};

load.onchange=e=>{
    const r=new FileReader();
    r.onload=()=> live=new Set(JSON.parse(r.result));
    r.readAsText(e.target.files[0]);
};

rle.onchange=e=>{
    const r=new FileReader();
    r.onload=()=> loadRLE(r.result);
    r.readAsText(e.target.files[0]);
};
</script>

</body>
</html>
