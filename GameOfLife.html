<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hardcore Game of Life</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:#0b0f14; color:#ddd; font-family:sans-serif; overflow:hidden; }
canvas { display:block; }
.ui {
    position:fixed; top:10px; left:10px;
    background:rgba(20,25,32,.9);
    padding:10px; border-radius:10px;
}
button, select {
    margin:2px; padding:5px;
    background:#1f2a36; color:#ddd;
    border:none; border-radius:5px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
<button id="run">Run</button>
<button id="pause">Pause</button>
<button id="step">Step</button>
<button id="clear">Clear</button>
<br>
<select id="pattern"></select>
<button id="stampMode">Stamp: OFF</button>
<br>
<button id="save">Save</button>
<input type="file" id="load">
</div>

<script>
// ===== Canvas =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;
function resize(){
    W = canvas.width = innerWidth;
    H = canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

// ===== Fast Encoding =====
// pack x,y into single int
function enc(x,y){ return (x<<16) ^ (y & 0xffff); }
function dec(k){ return [k>>16, (k<<16)>>16]; }

// ===== State =====
let live = new Set();

// ===== Patterns =====
const patterns = {
    "Glider": [[0,0],[1,0],[2,0],[2,1],[1,2]],
    "LWSS": [[0,1],[0,3],[1,0],[2,0],[3,0],[4,0],[4,3],[1,4],[4,4]],
    "Pulsar": [
        [-6,-4],[-6,-3],[-6,-2],[-6,2],[-6,3],[-6,4],
        [-1,-4],[-1,-3],[-1,-2],[-1,2],[-1,3],[-1,4],
        [-4,-6],[-3,-6],[-2,-6],[2,-6],[3,-6],[4,-6],
        [-4,-1],[-3,-1],[-2,-1],[2,-1],[3,-1],[4,-1],
        [-4,1],[-3,1],[-2,1],[2,1],[3,1],[4,1],
        [-4,6],[-3,6],[-2,6],[2,6],[3,6],[4,6],
        [1,-4],[1,-3],[1,-2],[1,2],[1,3],[1,4],
        [6,-4],[6,-3],[6,-2],[6,2],[6,3],[6,4]
    ],
    "Glider Gun": [
        [0,4],[1,4],[0,5],[1,5],
        [10,4],[10,5],[10,6],
        [11,3],[11,7],
        [12,2],[12,8],
        [13,2],[13,8],
        [14,5],
        [15,3],[15,7],
        [16,4],[16,5],[16,6],
        [17,5],
        [20,2],[20,3],[20,4],
        [21,2],[21,3],[21,4],
        [22,1],[22,5],
        [24,0],[24,1],[24,5],[24,6],
        [34,2],[34,3],[35,2],[35,3]
    ]
};

// populate dropdown
const patternSelect = document.getElementById("pattern");
for (let k in patterns) {
    let opt = document.createElement("option");
    opt.value = k;
    opt.textContent = k;
    patternSelect.appendChild(opt);
}

// ===== View =====
let scale = 10;
let offX = W/2;
let offY = H/2;

// ===== Simulation (Optimized) =====
function step(){
    const counts = new Map();

    for (let k of live){
        let [x,y] = dec(k);

        for (let dx=-1; dx<=1; dx++){
            for (let dy=-1; dy<=1; dy++){
                if (!dx && !dy) continue;
                let nk = enc(x+dx,y+dy);
                counts.set(nk,(counts.get(nk)||0)+1);
            }
        }
    }

    let next = new Set();

    for (let [k,c] of counts){
        if (c===3 || (c===2 && live.has(k))){
            next.add(k);
        }
    }

    live = next;
}

// ===== Render =====
function draw(){
    ctx.fillStyle="#0b0f14";
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle="#00ffa6";

    for (let k of live){
        let [x,y]=dec(k);
        let sx = x*scale+offX;
        let sy = y*scale+offY;

        if (sx<-scale||sy<-scale||sx>W||sy>H) continue;

        ctx.fillRect(sx,sy,scale,scale);
    }
}

// ===== Loop =====
let running=false;

function loop(){
    if (running) step();
    draw();
    requestAnimationFrame(loop);
}
loop();

// ===== Controls =====
run.onclick=()=>running=true;
pause.onclick=()=>running=false;
step.onclick=()=>{step(); draw();}
clear.onclick=()=>live.clear();

// ===== Interaction =====
let drag=false, lx, ly;

canvas.onmousedown=e=>{
    drag=true; lx=e.clientX; ly=e.clientY;
};
canvas.onmouseup=()=>drag=false;

canvas.onmousemove=e=>{
    if(drag){
        offX+=e.clientX-lx;
        offY+=e.clientY-ly;
        lx=e.clientX; ly=e.clientY;
    }
};

let stampMode=false;

stampModeBtn = document.getElementById("stampMode");
stampModeBtn.onclick=()=>{
    stampMode=!stampMode;
    stampModeBtn.textContent="Stamp: "+(stampMode?"ON":"OFF");
};

canvas.onclick=e=>{
    let x=Math.floor((e.clientX-offX)/scale);
    let y=Math.floor((e.clientY-offY)/scale);

    if(stampMode){
        let pat = patterns[patternSelect.value];
        for (let [dx,dy] of pat){
            live.add(enc(x+dx,y+dy));
        }
    } else {
        let k=enc(x,y);
        if(live.has(k)) live.delete(k);
        else live.add(k);
    }
};

// ===== Zoom =====
canvas.onwheel=e=>{
    e.preventDefault();
    let z = e.deltaY<0?1.1:0.9;

    offX = e.clientX - (e.clientX-offX)*z;
    offY = e.clientY - (e.clientY-offY)*z;

    scale*=z;
    scale=Math.max(2,Math.min(40,scale));
};

// ===== Save/Load =====
save.onclick=()=>{
    let arr=[...live];
    let blob=new Blob([JSON.stringify(arr)]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="life.json";
    a.click();
};

load.onchange=e=>{
    let f=e.target.files[0];
    let r=new FileReader();
    r.onload=()=>{
        live=new Set(JSON.parse(r.result));
    };
    r.readAsText(f);
};
</script>

</body>
</html>
