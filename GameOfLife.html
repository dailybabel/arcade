<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game of Life — Extreme+ FX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:#05070a; overflow:hidden; color:#ddd; font-family:sans-serif;}
canvas { display:block; }

.ui {
    position:fixed; top:10px; left:10px;
    background:rgba(20,25,32,.9);
    padding:10px; border-radius:10px;
}
button, select, input {
    margin:2px; padding:5px;
    background:#1f2a36; color:#ddd;
    border:none; border-radius:5px;
}
</style>
</head>
<body>

<canvas id="gl"></canvas>

<div class="ui">
<button id="run">Run</button>
<button id="pause">Pause</button>
<button id="step">Step</button>
<button id="clear">Clear</button>
<br>
<button id="stampBtn">Stamp: OFF</button>
<select id="pattern"></select>
<br>
<button id="save">Save</button>
<input type="file" id="load">
<br>
<input type="file" id="rle">
</div>

<script>
// =====================
// WebGL Setup
// =====================
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener("resize", resize);
resize();

// =====================
// Shaders (Glow + Trails)
// =====================
const vs = `
attribute vec2 a;
uniform vec2 u_offset;
uniform float u_scale;
uniform vec2 u_resolution;

void main(){
    vec2 p = a * u_scale + u_offset;
    vec2 clip = (p / u_resolution) * 2.0 - 1.0;
    gl_Position = vec4(clip.x, -clip.y, 0.0, 1.0);
    gl_PointSize = u_scale * 1.2;
}`;

const fs = `
precision mediump float;
void main(){
    float d = length(gl_PointCoord - vec2(0.5));
    float alpha = smoothstep(0.5, 0.0, d);
    vec3 col = vec3(0.0,1.0,0.7) * alpha;
    gl_FragColor = vec4(col, alpha);
}`;

function compile(type,src){
    let s=gl.createShader(type);
    gl.shaderSource(s,src);
    gl.compileShader(s);
    return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER,vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);

const a = gl.getAttribLocation(prog,"a");
gl.enableVertexAttribArray(a);
gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);

const u_offset = gl.getUniformLocation(prog,"u_offset");
const u_scale = gl.getUniformLocation(prog,"u_scale");
const u_resolution = gl.getUniformLocation(prog,"u_resolution");

// =====================
// Encoding
// =====================
function enc(x,y){ return (x<<16) ^ (y & 0xffff); }
function dec(k){ return [k>>16, (k<<16)>>16]; }

// =====================
// State
// =====================
let live = new Set();
let cache = new Map();

// =====================
// Patterns
// =====================
const patterns = {
    Glider: [[0,0],[1,0],[2,0],[2,1],[1,2]],
    LWSS: [[0,1],[0,3],[1,0],[2,0],[3,0],[4,0],[4,3],[1,4],[4,4]],
};

const patternSelect = document.getElementById("pattern");
for (let p in patterns){
    let o=document.createElement("option");
    o.value=p; o.textContent=p;
    patternSelect.appendChild(o);
}

let currentPattern="Glider";
patternSelect.onchange=()=>currentPattern=patternSelect.value;

// =====================
// Stamp + Rotation
// =====================
let stampMode=false;
let rotation=0;

stampBtn.onclick=()=>{
    stampMode=!stampMode;
    stampBtn.textContent="Stamp: "+(stampMode?"ON":"OFF");
};

addEventListener("keydown", e=>{
    if(e.key==="r"){
        rotation=(rotation+1)%4;
    }
});

function rotate([x,y]){
    if(rotation===0) return [x,y];
    if(rotation===1) return [-y,x];
    if(rotation===2) return [-x,-y];
    return [y,-x];
}

// =====================
// Simulation
// =====================
function hash(){
    let h=0;
    for(let k of live) h=((h<<5)-h)^k;
    return h;
}

function step(){
    let key=hash();
    if(cache.has(key)){
        live=new Set(cache.get(key));
        return;
    }

    let counts=new Map();

    for(let k of live){
        let [x,y]=dec(k);
        for(let dx=-1;dx<=1;dx++){
            for(let dy=-1;dy<=1;dy++){
                if(!dx&&!dy) continue;
                let nk=enc(x+dx,y+dy);
                counts.set(nk,(counts.get(nk)||0)+1);
            }
        }
    }

    let next=new Set();
    for(let [k,c] of counts){
        if(c===3||(c===2&&live.has(k))) next.add(k);
    }

    cache.set(key,[...next]);
    live=next;
}

// =====================
// Interaction
// =====================
let offX=canvas.width/2, offY=canvas.height/2;
let scale=8;
let mouseX=0, mouseY=0;

canvas.onmousemove=e=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
};

canvas.onclick=e=>{
    let x=Math.floor((e.clientX-offX)/scale);
    let y=Math.floor((e.clientY-offY)/scale);

    if(stampMode){
        for(let p of patterns[currentPattern]){
            let [dx,dy]=rotate(p);
            live.add(enc(x+dx,y+dy));
        }
    } else {
        let k=enc(x,y);
        if(live.has(k)) live.delete(k);
        else live.add(k);
    }
};

canvas.onwheel=e=>{
    e.preventDefault();
    let z=e.deltaY<0?1.1:0.9;
    offX=e.clientX-(e.clientX-offX)*z;
    offY=e.clientY-(e.clientY-offY)*z;
    scale*=z;
    scale=Math.max(2,Math.min(40,scale));
};

// =====================
// Render (with ghost)
// =====================
function draw(){
    let arr=[];

    for(let k of live){
        let [x,y]=dec(k);
        arr.push(x,y);
    }

    // ghost preview
    if(stampMode){
        let gx=Math.floor((mouseX-offX)/scale);
        let gy=Math.floor((mouseY-offY)/scale);

        for(let p of patterns[currentPattern]){
            let [dx,dy]=rotate(p);
            arr.push(gx+dx, gy+dy);
        }
    }

    let data=new Float32Array(arr);
    gl.bufferData(gl.ARRAY_BUFFER,data,gl.DYNAMIC_DRAW);

    gl.uniform2f(u_offset,offX,offY);
    gl.uniform1f(u_scale,scale);
    gl.uniform2f(u_resolution,canvas.width,canvas.height);

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

    gl.clearColor(0,0,0,0.15); // trail fade
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.drawArrays(gl.POINTS,0,data.length/2);
}

// =====================
// Loop
// =====================
let running=false;

function loop(){
    if(running) step();
    draw();
    requestAnimationFrame(loop);
}
loop();

// =====================
// UI
// =====================
run.onclick=()=>running=true;
pause.onclick=()=>running=false;
step.onclick=()=>{step(); draw();}
clear.onclick=()=>live.clear();

save.onclick=()=>{
    let blob=new Blob([JSON.stringify([...live])]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="life.json";
    a.click();
};

load.onchange=e=>{
    let r=new FileReader();
    r.onload=()=>live=new Set(JSON.parse(r.result));
    r.readAsText(e.target.files[0]);
};

rle.onchange=e=>{
    let r=new FileReader();
    r.onload=()=>loadRLE(r.result);
    r.readAsText(e.target.files[0]);
};

// RLE loader (same as before)
function loadRLE(text,ox=0,oy=0){
    let lines=text.split("\n").filter(l=>!l.startsWith("#"));
    let body=lines.slice(1).join("");
    let x=0,y=0,num="";
    for(let c of body){
        if(/\d/.test(c)){num+=c;continue;}
        let n=num?parseInt(num):1; num="";
        if(c==="b") x+=n;
        else if(c==="o"){for(let i=0;i<n;i++){live.add(enc(x+ox,y+oy));x++;}}
        else if(c==="$"){y+=n;x=0;}
        else if(c==="!") break;
    }
}
</script>

</body>
</html>
<script>
// =====================
// WebGL Renderer
// =====================
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener("resize", resize);
resize();

// shader
const vs = `
attribute vec2 a;
uniform vec2 u_offset;
uniform float u_scale;
void main(){
    vec2 p = (a * u_scale + u_offset);
    vec2 clip = (p / vec2(${innerWidth.toFixed(1)},${innerHeight.toFixed(1)})) * 2.0 - 1.0;
    gl_Position = vec4(clip.x, -clip.y, 0, 1);
    gl_PointSize = u_scale;
}`;
const fs = `
precision mediump float;
void main(){
    gl_FragColor = vec4(0.0,1.0,0.7,1.0);
}`;

// compile
function compile(type,src){
    let s=gl.createShader(type);
    gl.shaderSource(s,src);
    gl.compileShader(s);
    return s;
}
let prog = gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,vs));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);
gl.useProgram(prog);

let buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);

let a = gl.getAttribLocation(prog,"a");
gl.enableVertexAttribArray(a);
gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);

let u_offset = gl.getUniformLocation(prog,"u_offset");
let u_scale = gl.getUniformLocation(prog,"u_scale");

// =====================
// Core Engine
// =====================

// integer encoding
function enc(x,y){ return (x<<16) ^ (y & 0xffff); }
function dec(k){ return [k>>16, (k<<16)>>16]; }

let live = new Set();

// =====================
// Hashlife-lite cache
// =====================
let cache = new Map();

function hashRegion(keys){
    let h=0;
    for(let k of keys) h = ((h<<5)-h) ^ k;
    return h;
}

// simple memo step
function stepCached(){
    let key = hashRegion(live);
    if(cache.has(key)){
        live = new Set(cache.get(key));
        return;
    }

    let counts = new Map();
    for(let k of live){
        let [x,y]=dec(k);
        for(let dx=-1;dx<=1;dx++){
            for(let dy=-1;dy<=1;dy++){
                if(!dx&&!dy) continue;
                let nk=enc(x+dx,y+dy);
                counts.set(nk,(counts.get(nk)||0)+1);
            }
        }
    }

    let next = new Set();
    for(let [k,c] of counts){
        if(c===3 || (c===2 && live.has(k))) next.add(k);
    }

    cache.set(key, [...next]);
    live = next;
}

// =====================
// RLE Import
// =====================
function loadRLE(text, ox=0, oy=0){
    let lines = text.split("\n").filter(l=>!l.startsWith("#"));
    let body = lines.slice(1).join("");

    let x=0,y=0,num="";
    for(let c of body){
        if(/\d/.test(c)){ num+=c; continue; }
        let n = num?parseInt(num):1;
        num="";

        if(c==="b"){ x+=n; }
        else if(c==="o"){
            for(let i=0;i<n;i++){
                live.add(enc(x+ox,y+oy));
                x++;
            }
        }
        else if(c==="$"){
            y+=n; x=0;
        }
        else if(c==="!") break;
    }
}

// =====================
// Interaction
// =====================
let offX=canvas.width/2, offY=canvas.height/2;
let scale=8;

canvas.onclick=e=>{
    let x=Math.floor((e.clientX-offX)/scale);
    let y=Math.floor((e.clientY-offY)/scale);
    let k=enc(x,y);
    if(live.has(k)) live.delete(k);
    else live.add(k);
};

canvas.onwheel=e=>{
    e.preventDefault();
    let z=e.deltaY<0?1.1:0.9;
    offX = e.clientX - (e.clientX-offX)*z;
    offY = e.clientY - (e.clientY-offY)*z;
    scale*=z;
};

// =====================
// Render (GPU)
// =====================
function draw(){
    let arr=[];
    for(let k of live){
        let [x,y]=dec(k);
        arr.push(x,y);
    }

    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(arr),gl.DYNAMIC_DRAW);

    gl.uniform2f(u_offset, offX, offY);
    gl.uniform1f(u_scale, scale);

    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.drawArrays(gl.POINTS,0,arr.length/2);
}

// =====================
// Loop
// =====================
let running=false;

function loop(){
    if(running) stepCached();
    draw();
    requestAnimationFrame(loop);
}
loop();

// =====================
// UI
// =====================
run.onclick=()=>running=true;
pause.onclick=()=>running=false;
step.onclick=()=>{stepCached(); draw();}
clear.onclick=()=>live.clear();

save.onclick=()=>{
    let blob=new Blob([JSON.stringify([...live])]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="life.json";
    a.click();
};

load.onchange=e=>{
    let r=new FileReader();
    r.onload=()=> live=new Set(JSON.parse(r.result));
    r.readAsText(e.target.files[0]);
};

rle.onchange=e=>{
    let r=new FileReader();
    r.onload=()=> loadRLE(r.result);
    r.readAsText(e.target.files[0]);
};

</script>
</body>
</html>
