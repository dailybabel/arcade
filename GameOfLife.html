<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Infinite Game of Life</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0b0f14;
        color: #e0e6ed;
        font-family: system-ui, sans-serif;
    }

    canvas {
        display: block;
    }

    .ui {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(20, 25, 32, 0.9);
        padding: 10px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    button, input {
        margin: 3px;
        padding: 6px 10px;
        border-radius: 6px;
        border: none;
        background: #1f2a36;
        color: #e0e6ed;
        cursor: pointer;
    }

    button:hover {
        background: #2e3c4c;
    }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="ui">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="step">Step</button>
    <button id="clear">Clear</button>
    <br/>
    <button id="save">Save</button>
    <input type="file" id="load" />
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let width, height;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ===== Simulation State =====
let liveCells = new Set();

function key(x, y) { return `${x},${y}`; }
function parse(k) { return k.split(',').map(Number); }

// ===== View Transform =====
let offsetX = width / 2;
let offsetY = height / 2;
let scale = 10;

// ===== Simulation =====
function stepSimulation() {
    const neighborCounts = new Map();

    for (let k of liveCells) {
        const [x, y] = parse(k);

        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                if (dx === 0 && dy === 0) continue;

                const nk = key(x + dx, y + dy);
                neighborCounts.set(nk, (neighborCounts.get(nk) || 0) + 1);
            }
        }
    }

    const newLive = new Set();

    for (let [k, count] of neighborCounts) {
        if (count === 3 || (count === 2 && liveCells.has(k))) {
            newLive.add(k);
        }
    }

    liveCells = newLive;
}

// ===== Rendering =====
function drawGrid() {
    const gridSize = scale;
    ctx.strokeStyle = "#16202b";
    ctx.lineWidth = 1;

    const startX = (-offsetX % gridSize);
    const startY = (-offsetY % gridSize);

    for (let x = startX; x < width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
    }

    for (let y = startY; y < height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
    }
}

function render() {
    ctx.fillStyle = "#0b0f14";
    ctx.fillRect(0, 0, width, height);

    drawGrid();

    ctx.fillStyle = "#00ffa6";

    for (let k of liveCells) {
        const [x, y] = parse(k);

        const sx = x * scale + offsetX;
        const sy = y * scale + offsetY;

        if (sx < -scale || sy < -scale || sx > width || sy > height) continue;

        ctx.fillRect(sx, sy, scale, scale);
    }
}

// ===== Game Loop =====
let running = false;

function loop() {
    if (running) {
        stepSimulation();
    }
    render();
    requestAnimationFrame(loop);
}
loop();

// ===== Controls =====
document.getElementById("start").onclick = () => running = true;
document.getElementById("pause").onclick = () => running = false;
document.getElementById("step").onclick = () => {
    stepSimulation();
    render();
};
document.getElementById("clear").onclick = () => liveCells.clear();

// ===== Mouse Interaction =====
let dragging = false;
let lastX, lastY;

canvas.addEventListener("mousedown", (e) => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
});

canvas.addEventListener("mouseup", () => dragging = false);
canvas.addEventListener("mouseleave", () => dragging = false);

canvas.addEventListener("mousemove", (e) => {
    if (dragging) {
        offsetX += e.clientX - lastX;
        offsetY += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
    }
});

canvas.addEventListener("click", (e) => {
    const x = Math.floor((e.clientX - offsetX) / scale);
    const y = Math.floor((e.clientY - offsetY) / scale);

    const k = key(x, y);
    if (liveCells.has(k)) liveCells.delete(k);
    else liveCells.add(k);
});

// ===== Zoom =====
canvas.addEventListener("wheel", (e) => {
    e.preventDefault();

    const zoom = e.deltaY < 0 ? 1.1 : 0.9;

    const mx = e.clientX;
    const my = e.clientY;

    offsetX = mx - (mx - offsetX) * zoom;
    offsetY = my - (my - offsetY) * zoom;

    scale *= zoom;
    scale = Math.max(2, Math.min(50, scale));
});

// ===== Save =====
document.getElementById("save").onclick = () => {
    const data = {
        cells: Array.from(liveCells)
    };

    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "life.json";
    a.click();
};

// ===== Load =====
document.getElementById("load").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
        const data = JSON.parse(reader.result);
        liveCells = new Set(data.cells || []);
    };
    reader.readAsText(file);
});
</script>

</body>
</html>
